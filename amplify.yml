version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - npm run build
        - echo "=== Build output contents (out/) ==="
        - ls -la out/ | head -20
        - echo "=== Checking for index.html ==="
        - ls -l out/index.html || echo "No out/index.html"
        - echo "=== Number of files ==="
        - find out -type f | wc -l
  artifacts:
    baseDirectory: out
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
